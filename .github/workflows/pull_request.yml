on: [pull_request]
name: PullRequest
jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.x]
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate embedded Linux sandal (darwin only)
        # The darwin build path embeds a linux sandal via go:embed.
        # Running go generate here verifies the cross-compile step and
        # replaces the committed text placeholder with a real ELF so the
        # subsequent `go build` exercises the full embed flow.
        if: runner.os == 'macOS'
        run: go generate ./pkg/sandal/vmbin
      - name: Build
        run: go build -v -o /dev/null .

  integration-test:
    name: Integration Test (${{ matrix.daemon-mode }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.x]
        daemon-mode: [daemon, daemonless]
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run integration tests
        run: |
          if [ "${{ matrix.daemon-mode }}" = "daemon" ]; then
            export USE_DAEMON=true
          fi
          sudo -E bash ./test.sh

  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - name: Configure Git token
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install -r requirements.txt
      - run: DEBIAN_FRONTEND=noninteractive sudo apt install -y libcairo2
      - name: Build docs
        run: mkdocs build