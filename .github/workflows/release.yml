on:
  push:
    tags:
      - 'v*'  # This will match tags that start with 'v', like v1.0.0
name: Release
jobs:
  test:
    name: Build Test
    strategy:
      matrix:
        go-version: [1.26.x]
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build
        run: go build -v -o /dev/null .

  release_binaries:
    name: Release Binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --config .github/goreleaser.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  mkdocs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install -r requirements.txt
      - run: DEBIAN_FRONTEND=noninteractive sudo apt install -y libcairo2
      - name: Build docs
        run: mkdocs build
      - name: Deploy to gh-pages root (preserve /beta/)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin gh-pages
          git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'beta' -exec rm -rf {} +
          cp -a site/. gh-pages-worktree/
          cd gh-pages-worktree
          git add -A
          if git diff --cached --quiet; then
            echo "No doc changes to publish"
          else
            git commit -m "Deploy docs (${GITHUB_SHA:0:7})"
            git push origin gh-pages
          fi
